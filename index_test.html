<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSI Live Monitor</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>CSI Live Monitor</h1>
          <p>Latest CSI image + model outputs in near real time.</p>
        </div>
        <div class="header-controls">
          <button id="historyToggleBtn" class="btn" type="button" aria-expanded="false">History</button>

          <label class="control-group" for="historyLimit">
            <span>Rows</span>
            <select id="historyLimit" class="dropdown">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="20">20</option>
              <option value="50">50</option>
            </select>
          </label>

          <label class="control-group" for="historySort">
            <span>Order</span>
            <select id="historySort" class="dropdown">
              <option value="desc" selected>Newest</option>
              <option value="asc">Oldest</option>
            </select>
          </label>
        </div>
      </header>

      <section class="panel image-panel">
        <h2>Latest Image</h2>
        <div class="image-wrap">
          <img id="latestImage" alt="Latest CSI frame" />
        </div>
        <p id="imageMeta" class="muted">Waiting for data...</p>
      </section>

      <section class="panel data-panel">
        <h2>Predictions</h2>
        <div class="grid">
          <article>
            <h3>Activity API</h3>
            <div class="stats">
              <p><strong>Label:</strong> <span id="activityLabel">-</span></p>
              <p><strong>Confidence:</strong> <span id="activityConfidence">-</span></p>
            </div>
            <pre id="activityResult">No data yet</pre>
          </article>
          <article>
            <h3>Presence API</h3>
            <div class="stats">
              <p><strong>Label:</strong> <span id="presenceLabel">-</span></p>
              <p><strong>Confidence:</strong> <span id="presenceConfidence">-</span></p>
            </div>
            <pre id="presenceResult">No data yet</pre>
          </article>
        </div>
      </section>

      <section id="historyPanel" class="panel history-panel hidden" aria-live="polite">
        <h2>Prediction History</h2>
        <p class="muted">Latest prediction rows from Supabase.</p>
        <div id="historyList" class="history-list"></div>
      </section>

      <footer class="footer muted">
        <span id="status">Connecting...</span>
      </footer>
    </main>
  </body>
</html>
