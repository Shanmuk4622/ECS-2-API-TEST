<!DOCTYPE html>
<html>
<head>
    <title>CSI HAR Demo</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
        }

        #dropZone {
            border: 2px dashed #aaa;
            padding: 40px;
            width: 320px;
            margin: auto;
            cursor: pointer;
            border-radius: 10px;
        }

        #dropZone.hover {
            border-color: green;
        }

        img {
            margin-top: 20px;
            max-width: 320px;
            border-radius: 8px;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
            white-space: pre-line;
        }
    </style>
</head>
<body>

<h2>CSI HAR Demo</h2>

<div id="dropZone">
    Drag & Drop PNG here<br>or click to upload
</div>

<input type="file" id="fileInput" accept="image/png" hidden />

<br>

<button onclick="predictPresence()">Predict Presence</button>
<button onclick="predictActivity()">Predict Activity</button>

<p id="result">No file selected</p>

<img id="preview" />

<script>
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const resultText = document.getElementById("result");
const preview = document.getElementById("preview");

let selectedFile = null;

// 🔥 REPLACE THESE WITH YOUR REAL MODAL URLS
const PRESENCE_URL = "https://sameern1404--csi-har-modelservice-predict-presence.modal.run";
const ACTIVITY_URL = "https://sameern1404--csi-har-modelservice-predict-activity.modal.run";


// -------------------------------
// File handling
// -------------------------------
dropZone.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
    handleFile(e.target.files[0]);
};

dropZone.ondragover = (e) => {
    e.preventDefault();
    dropZone.classList.add("hover");
};

dropZone.ondragleave = () => {
    dropZone.classList.remove("hover");
};

dropZone.ondrop = (e) => {
    e.preventDefault();
    dropZone.classList.remove("hover");
    handleFile(e.dataTransfer.files[0]);
};


// -------------------------------
// Validate + Preview
// -------------------------------
function handleFile(file) {
    if (!file) return;

    if (!file.type.includes("png")) {
        alert("❌ Only PNG images allowed!");
        return;
    }

    selectedFile = file;

    const reader = new FileReader();
    reader.onload = (e) => {
        preview.src = e.target.result;
    };
    reader.readAsDataURL(file);

    resultText.innerText = "✅ File loaded. Ready to predict.";
}


// -------------------------------
// API Call
// -------------------------------
async function sendRequest(url) {
    if (!selectedFile) {
        alert("Upload a PNG first!");
        return;
    }

    resultText.innerText = "⏳ Processing...";

    try {
        const formData = new FormData();
        formData.append("file", selectedFile);  // MUST match backend name

        const response = await fetch(url, {
            method: "POST",
            body: formData
        });

        // 🔥 show actual backend error
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`Server ${response.status}: ${errText}`);
        }

        const data = await response.json();

        resultText.innerText =
            `🎯 ${data.label}\nConfidence: ${data.confidence.toFixed(4)}`;

    } catch (err) {
        console.error(err);
        resultText.innerText = "❌ Error:\n" + err.message;
    }
}


// -------------------------------
// Buttons
// -------------------------------
function predictPresence() {
    sendRequest(PRESENCE_URL);
}

function predictActivity() {
    sendRequest(ACTIVITY_URL);
}
</script>

</body>
</html>
